<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Lightbulb illustration</title>
  <desc id="desc">A glowing lightbulb over a soft blue gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#0f3b4b" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#fbbf24" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bulbGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0.75" />
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
